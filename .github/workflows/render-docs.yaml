name: Render README and vignettes

on:
  push:
    branches: [main]
    paths:
      - "R/**"
      - "data/**"
      - "data-raw/**"
      - "vignettes/**"
      - "README.Rmd"
      - "index.html"
      - "DESCRIPTION"
      - "tests/**"
      - "tools/**"
      - ".github/workflows/render-docs.yaml"
  pull_request:
    paths:
      - "R/**"
      - "data/**"
      - "data-raw/**"
      - "vignettes/**"
      - "README.Rmd"
      - "README.md"
      - "index.html"
      - "DESCRIPTION"
      - "tests/**"
      - "tools/**"
      - ".github/workflows/render-docs.yaml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render-docs:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Set up Pandoc
        uses: r-lib/actions/setup-pandoc@v2

      - name: Install package dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::pkgload
            local::.
          needs: |
            check

      - name: Run package tests
        run: testthat::test_local(reporter = "summary")
        shell: Rscript {0}

      - name: Render README and vignette
        run: source("tools/render-docs.R")
        shell: Rscript {0}

      - name: Commit rendered documentation
        if: github.event_name == 'push'
        run: |
          git add README.md index.html man/figures
          if git diff --cached --quiet; then
            echo "README and figures are already up to date."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -m "Render README and vignette outputs"
            git push
          fi

      - name: Check rendered documentation is current
        if: github.event_name == 'pull_request'
        run: git diff --exit-code -- README.md index.html man/figures
